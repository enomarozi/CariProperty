<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="bg-light d-flex align-items-center justify-content-center vh-100">

    <div class="card shadow-lg border-0 p-4" style="max-width: 400px; width: 100%; border-top: 5px solid orange;">
        
        <!-- Icon -->
        <div class="text-center mb-3">
            <i class="bi bi-person-circle display-3 text-warning"></i>
        </div>

        <!-- Title -->
        <h3 class="text-center fw-bold text-dark mb-4">Sign In</h3>

        <!-- Form -->
        <form action="{% url 'signin' %}" method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label fw-semibold text-secondary">Username</label>
                {{ form.username }}
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold text-secondary">Password</label>
                {{ form.password }}
            </div>

            <button type="submit" class="btn btn-warning w-100 fw-semibold text-white">
                <i class="bi bi-box-arrow-in-right me-1"></i> Login
            </button>

            <div class="text-center mt-3">
                <a href="{% url 'signup' %}" class="text-decoration-none text-warning fw-semibold">
                    Forgot Password?
                </a>
            </div>
        </form>
    </div>

    <!-- Alerts -->
    {% if messages %}
    <div class="position-fixed top-0 start-50 translate-middle-x mt-3" style="z-index: 1050; width: 100%; max-width: 400px;">
        {% for message in messages %}
            <div class="alert {% if message.tags == 'error' %}alert-danger{% else %}alert-warning{% endif %} text-center shadow-sm">
                {{ message }}
            </div>
        {% endfor %}
    </div>
    {% endif %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
