<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body class="bg-light d-flex align-items-center justify-content-center vh-100">

    <div class="d-flex flex-column align-items-center" style="width: 100%; max-width: 420px;">

        <div class="text-center mb-3">
            <h3 class="fw-bold mb-1">
                Cari<span style="color:#d95f18;">Property</span>
            </h3>
            <div class="small text-secondary">Indonesia</div>
        </div>
        <div class="card shadow border-0 p-4 rounded-4 w-100">
            
            <div class="text-center mb-3">
                <i class="bi bi-person-circle display-4" style="color: #d95f18"></i>
            </div>

            <h5 class="text-center fw-semibold mb-4">Sign In</h5>

            <form action="{% url 'signin' %}" method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label fw-semibold">Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white">
                            <i class="bi bi-person"></i>
                        </span>
                        {{ form.username }}
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white">
                            <i class="bi bi-lock"></i>
                        </span>
                        {{ form.password }}
                    </div>
                </div>

                <button type="submit" class="btn w-100 fw-semibold text-white py-2" style="background-color:#d95f18">
                    <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
                </button>

                <div class="text-center mt-3">
                    <a href="{% url 'signup' %}" class="text-decoration-none fw-semibold">
                        Create an account
                    </a>
                </div>

                <div class="text-center mt-2">
                    <a href="#" class="text-muted small text-decoration-none">
                        Forgot password?
                    </a>
                </div>
            </form>
        </div>

    </div>

    {% if messages %}
    <script>
        {% for message in messages %}
            Swal.fire({
                icon: "{% if message.tags == 'error' %}error{% else %}warning{% endif %}",
                title: "Notification",
                text: "{{ message }}",
                confirmButtonColor: "#d95f18",
                heightAuto: false
            });
        {% endfor %}
    </script>
    {% endif %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
