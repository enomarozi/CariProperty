<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body class="bg-body-tertiary d-flex align-items-center justify-content-center vh-100">

    <div class="d-flex flex-column align-items-center" style="width:100%; max-width:420px;">

        <div class="text-center mb-4">
            <h3 class="fw-bold mb-1">
                Cari<span style="color:#d95f18;">Property</span>
            </h3>
            <div class="small text-secondary">Indonesia</div>
        </div>

        <div class="card shadow border-0 p-4 rounded-4 w-100">

            <div class="text-center mb-3">
                <i class="bi bi-person-plus-fill display-4" style="color:#d95f18"></i>
            </div>

            <h5 class="text-center fw-semibold mb-4">Create Account</h5>

            <form action="{% url 'signup' %}" method="POST">
                {% csrf_token %}

                <div class="mb-2">
                    <label class="form-label fw-semibold">Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white">
                            <i class="bi bi-person"></i>
                        </span>
                        {{ form.username }}
                    </div>
                </div>

                <div class="mb-2">
                    <label class="form-label fw-semibold">Email</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white">
                            <i class="bi bi-envelope"></i>
                        </span>
                        {{ form.email }}
                    </div>
                </div>

                <div class="mb-2">
                    <label class="form-label fw-semibold">No HP (+62)</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white">
                            <i class="bi bi-telephone"></i>
                        </span>
                        {{ form.no_hp }}
                    </div>
                </div>
                <div class="mb-2">
                    <label class="form-label fw-semibold">Tanggal Lahir</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white">
                            <i class="bi bi-calendar-date"></i>
                        </span>
                        {{ form.tanggal_lahir }}
                    </div>
                </div>

                <div class="mb-2">
                    <label class="form-label fw-semibold">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white">
                            <i class="bi bi-lock"></i>
                        </span>
                        {{ form.password1 }}
                    </div>
                </div>

                <div class="mb-2">
                    <label class="form-label fw-semibold">Confirm Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white">
                            <i class="bi bi-lock-fill"></i>
                        </span>
                        {{ form.password2 }}
                    </div>
                </div>

                <button type="submit" class="btn w-100 fw-semibold text-white py-2" style="background-color:#d95f18">
                    <i class="bi bi-person-plus me-1"></i> Sign Up
                </button>

                <div class="text-center mt-3">
                    <span class="text-secondary small">Already have an account?</span><br>
                    <a href="{% url 'signin' %}" class="fw-semibold text-decoration-none" style="color:#d95f18;">
                        Sign In
                    </a>
                </div>
            </form>

        </div>
    </div>

    {% if messages %}
    <script>
        {% for message in messages %}
            Swal.fire({
                icon: "{% if message.tags == 'error' %}error{% else %}warning{% endif %}",
                title: "Notification",
                text: "{{ message }}",
                confirmButtonColor: "#d95f18",
                heightAuto: false
            });
        {% endfor %}
    </script>
    {% endif %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
